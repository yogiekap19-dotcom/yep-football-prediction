    function MulaiCetakDropdown(sumberData) {
        const dropdown = document.getElementById("pilih-match");
        dropdown.innerHTML = ""; 
        daftarPertandinganFinal.forEach((laga, index) => {
            if (laga.homeTeam && laga.homeTeam.name && laga.awayTeam && laga.awayTeam.name) {
                const opsiBaru = document.createElement("option");
                opsiBaru.value = index;
                opsiBaru.text = `Laga ${index + 1}: ${laga.homeTeam.name} vs ${laga.awayTeam.name}`;
                dropdown.appendChild(opsiBaru);
            }
        });
        prosesPerhitunganPrediksi(0);
    }

    function hitungFormulaOtomatis(home, away) {
        const bersihHome = home.replace(/[^\x00-\x7F]/g, "").trim();
        const bersihAway = away.replace(/[^\x00-\x7F]/g, "").trim();
        
        let hashH = 0; for(let i=0; i<bersihHome.length; i++) hashH += bersihHome.charCodeAt(i) * (i + 1);
        let hashA = 0; for(let i=0; i<bersihAway.length; i++) hashA += bersihAway.charCodeAt(i) * (i + 2);

        function racikFormula(faktorH, faktorA, penyeimbang) {
            let h = 15 + ((hashH * faktorH) % 55);
            let a = 15 + ((hashA * faktorA) % 55);
            let s = 10 + ((hashH + hashA + penyeimbang) % 18);
            let total = h + a + s;
            return [(h/total)*100, (s/total)*100, (a/total)*100];
        }

        const [h1, s1, a1] = racikFormula(3, 2, 5);
        const [h2, s2, a2] = racikFormula(1, 4, 12);
        const [h3, s3, a3] = racikFormula(5, 1, 7);
        const [h4, s4, a4] = racikFormula(2, 3, 9);

        function hitungSkorMata(h, s, a) {
            if (h > a && h > s) return (h - a > 20) ? "2-0" : "2-1";
            if (a > h && a > s) return (a - h > 20) ? "0-2" : "1-2";
            return (s > 20) ? "0-0" : "1-1";
        }

        return [
            { nama: "Formula Alpha (Tren)", home: h1, seri: s1, away: a1, skor: hitungSkorMata(h1, s1, a1) },
            { nama: "Formula Beta (Gol)", home: h2, seri: s2, away: a2, skor: hitungSkorMata(h2, s2, a2) },
            { nama: "Formula Gamma (H2H)", home: h3, seri: s3, away: a3, skor: hitungSkorMata(h3, s3, a3) },
            { nama: "Formula Delta (Defensif)", home: h4, seri: s4, away: a4, skor: hitungSkorMata(h4, s4, a4) }
        ];
    }

    function prosesPerhitunganPrediksi(index) {
        const laga = daftarPertandinganFinal[index];
        const rawHome = laga.homeTeam.name;
        const rawAway = laga.awayTeam.name;

        const flagHome = rawHome.match(/[\uD83C-\uDBFF\uDC00-\uDFFF]+/g) || "";
        
        const namaHome = rawHome.replace(/[^\x00-\x7F]/g, "").trim().toUpperCase();
        const namaAway = rawAway.replace(/[^\x00-\x7F]/g, "").trim().toUpperCase();

        document.getElementById("header-home").innerText = namaHome;
        document.getElementById("header-away").innerText = namaAway;
        document.getElementById("bawah-nama-home").innerText = namaHome;
        document.getElementById("bawah-nama-away").innerText = namaAway;

        const dataPrediksi = hitungFormulaOtomatis(rawHome, rawAway);
        const tempatData = document.getElementById("tempat-data");
        tempatData.innerHTML = ""; 

        let totalHome = 0, totalSeri = 0, totalAway = 0;
        let vHome = 0, vSeri = 0, vAway = 0;

        dataPrediksi.forEach(item => {
            tempatData.innerHTML += `
                <tr class="hover:bg-gray-800 hover:bg-opacity-40 transition border-b border-gray-900">
                    <td class="py-3.5 text-left pl-4 font-medium text-gray-400">${item.nama}</td>
                    <td class="text-blue-400 font-semibold">${item.home.toFixed(1)}%</td>
                    <td class="text-yellow-500 font-semibold">${item.seri.toFixed(1)}%</td>
                    <td class="text-orange-400 font-semibold">${item.away.toFixed(1)}%</td>
                    <td class="text-green-400 font-bold font-mono">${item.skor}</td>
                </tr>
            `;
            totalHome += item.home; totalSeri += item.seri; totalAway += item.away;
            
            if(item.home > item.away && item.home > item.seri) vHome++;
            else if(item.away > item.home && item.away > item.seri) vAway++;
            else vSeri++;
        });

        const avgHome = (totalHome / 4).toFixed(1);
        const avgSeri = (totalSeri / 4).toFixed(1);
        const avgAway = (totalAway / 4).toFixed(1);

        document.getElementById("rata-home").innerText = avgHome + "%";
        document.getElementById("rata-seri").innerText = avgSeri + "%";
        document.getElementById("rata-away").innerText = avgAway + "%";

        document.getElementById("badge-home").innerText = `${vHome}/4 FORMULA → ${namaHome}`;
        document.getElementById("badge-seri").innerText = `${vSeri}/4 → SERI`;
        document.getElementById("badge-away").innerText = `${vAway}/4 → ${namaAway}`;

        let pemenangKonsensus = "";
        let skorFinal = "1-1";
        if (parseFloat(avgHome) > parseFloat(avgAway) && parseFloat(avgHome) > parseFloat(avgSeri)) {
            pemenangKonsensus = namaHome;
            skorFinal = parseFloat(avgHome) - parseFloat(avgAway) > 20 ? "2-0" : "2-1";
        } else if (parseFloat(avgAway) > parseFloat(avgHome) && parseFloat(avgAway) > parseFloat(avgSeri)) {
            pemenangKonsensus = namaAway;
            skorFinal = parseFloat(avgAway) - parseFloat(avgHome) > 20 ? "0-2" : "1-2";
        } else {
            pemenangKonsensus = "POSISI SEIMBANG / SERI";
            skorFinal = parseFloat(avgSeri) > 22 ? "0-0" : "1-1";
        }

        document.getElementById("judul-flag").innerText = flagHome;
        document.getElementById("judul-tim").innerText = pemenangKonsensus;
        document.getElementById("skor-header").innerText = skorFinal;
        document.getElementById("skor-raksasa").innerText = skorFinal;

        let maxP = Math.max(avgHome, avgSeri, avgAway);
        let tingkat = "KEYAKINAN SEDANG";
        if(maxP > 55) tingkat = "KEYAKINAN TINGGI";
        if(maxP < 38) tingkat = "KEYAKINAN RENDAH";
        document.getElementById("status-keyakinan").innerText = `${tingkat} · ${maxP}%`;
    }

    function gantiPertandingan() {
        const idTerpilih = document.getElementById("pilih-match").value;
